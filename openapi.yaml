          type: string

    SellerDetail:
      type: object
      required: [id, userId, storeName, status, createdAt, products]
      properties:
        id:
          type: integer
        userId:
          type: integer
        storeName:
          type: string
        storeDescription:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
