        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        stock:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        sellerId:
          type: integer
        sellerName:
          type: string
        sellerRating:
          type: number
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        rating:
          type: number
        reviewCount:
          type: integer
        isEcoFriendly:
          type: boolean
        isFeatured:
          type: boolean
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"

    ProductInput:
      type: object
      required: [name, price, stock, categoryId]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        comparePrice:
          type: number
        stock:
          type: integer
        categoryId:
          type: integer
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        isEcoFriendly:
          type: boolean
        tags:
          type: array
          items:
            type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        comparePrice:
          type: number
        stock:
          type: integer
        categoryId:
          type: integer
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        isEcoFriendly:
          type: boolean
        isFeatured:
          type: boolean
        tags:
          type: array
          items:
            type: string

    InventoryUpdate:
      type: object
      required: [stock]
      properties:
        stock:
          type: integer

    ProductListResponse:
      type: object
      required: [products, total, page, totalPages]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    # Category
    Category:
      type: object
      required: [id, name, productCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: ["string", "null"]
        productCount:
          type: integer

    # Cart
    Cart:
      type: object
      required: [id, items, subtotal, itemCount]
      properties:
        id:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        itemCount:
          type: integer
        discountAmount:
          type: number
        total:
          type: number

    CartItem:
      type: object
      required: [id, productId, productName, price, quantity, imageUrl]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        imageUrl:
          type: string
        stock:
          type: integer

