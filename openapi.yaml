        userId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded]
        subtotal:
          type: number
        shippingCost:
          type: number
        total:
          type: number
        shippingAddress:
          type: string
        paymentIntentId:
          type: ["string", "null"]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, refunded]
        trackingNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    OrderItem:
      type: object
